name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/sicoob_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - name: ruff (baseline — não bloqueante ainda)
        run: ruff check --exit-zero src tests

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Nenhum .js pode existir em public/
        run: test -z "$(find public -name '*.js' -o -name '*.mjs')"
      - run: docker build -t web:ci .
      - run: docker build -t sicoob:ci python/sicoob_service
      - name: Smoke test do container web
        run: |
          docker run -d --name web-ci -p 8080:8080 web:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/ && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/ | grep -q "Servidor ativo"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/app.js)" = "404"
          docker logs web-ci
